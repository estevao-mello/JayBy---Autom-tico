<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta — JayBy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">

  <div class="auth-blob blob-1"></div>
  <div class="auth-blob blob-2"></div>
  <div class="auth-blob blob-3"></div>
  <div class="auth-blob blob-4"></div>
  <img class="auth-mark mark-1" src="assets/jayby-icon.png" alt="">
  <img class="auth-mark mark-2" src="assets/jayby-icon.png" alt="">
  <img class="auth-mark mark-3" src="assets/jayby-icon.png" alt="">

  <div class="auth-card-wrap">
    <img class="auth-logo" src="assets/jayby-nav-lockup.png" alt="JayBy">

    <h1>Crie sua conta</h1>
    <p class="auth-sub">Comece a montar sua linha de produção de ebooks agora.</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="signupForm">
      <div class="field-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
      </div>
      <div class="field-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="voce@email.com" required>
      </div>
      <div class="field-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Mínimo 8 caracteres" minlength="8" required>
      </div>
      <div class="field-group">
        <label for="confirma">Confirmar senha</label>
        <input type="password" id="confirma" placeholder="Repita a senha" minlength="8" required>
      </div>

      <div class="field-row">
        <label class="checkbox-row">
          <input type="checkbox" required>
          Concordo com os <a class="link-teal" href="#">termos de uso</a>
        </label>
      </div>

      <button type="submit" class="btn btn-solid">Criar conta</button>
    </form>

    <div class="auth-divider">ou continue com</div>
    <div class="social-row">
      <button class="social-btn"><span class="dot dot-g">G</span>Google</button>
      <button class="social-btn"><span class="dot dot-m">M</span>Microsoft</button>
      <button class="social-btn"><span class="dot dot-a">A</span>Apple</button>
    </div>

    <p class="auth-switch" style="margin-top:18px;">Já tem conta? <a class="link-teal" href="login.html">Entrar</a></p>
  </div>

</div>

<script>
  document.getElementById('signupForm').addEventListener('submit', function(e){
    e.preventDefault();
    const senha = document.getElementById('senha').value;
    const confirma = document.getElementById('confirma').value;
    const msg = document.getElementById('formMsg');
    if(senha !== confirma){
      msg.textContent = "As senhas não coincidem. Verifique e tente novamente.";
      msg.className = "form-msg show";
      msg.style.background = "#FBEAE3";
      msg.style.color = "#7A2E14";
      return;
    }
    msg.textContent = "Conta criada! (protótipo de front-end — ainda sem backend conectado)";
    msg.className = "form-msg show ok";
  });
</script>

</body>
</html>
